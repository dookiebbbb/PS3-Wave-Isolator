name: Build PS3 Wave Screensaver PKG

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build PKG
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake bison flex gcc g++ \
            libelf-dev make texinfo libncurses5-dev \
            patch python3 python3-dev wget zlib1g-dev \
            libtool libtool-bin bzip2 libgmp-dev \
            pkg-config libssl-dev git
          # ps3toolchain checks for 'python-config' — symlink python3-config
          sudo ln -sf /usr/bin/python3-config /usr/local/bin/python-config
          sudo ln -sf /usr/bin/python3 /usr/local/bin/python

      - name: Cache ps3toolchain
        id: cache-ps3dev
        uses: actions/cache@v4
        with:
          path: /usr/local/ps3dev
          key: ps3dev-toolchain-v4

      - name: Build ps3toolchain
        if: steps.cache-ps3dev.outputs.cache-hit != 'true'
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=$PS3DEV
          export PATH=$PATH:$PS3DEV/bin:$PS3DEV/ppu/bin:$PS3DEV/spu/bin
          sudo mkdir -p $PS3DEV
          sudo chmod 777 $PS3DEV
          git clone https://github.com/ps3dev/ps3toolchain.git
          cd ps3toolchain
          PARALLEL_MAKE=-j$(nproc) ./toolchain.sh
          cd ..
          git clone https://github.com/ps3dev/PSL1GHT.git
          cd PSL1GHT
          make install
          cd ..

      - name: Set environment
        run: |
          echo "PS3DEV=/usr/local/ps3dev"      >> $GITHUB_ENV
          echo "PSL1GHT=/usr/local/ps3dev/ppu" >> $GITHUB_ENV
          echo "PATH=/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:$PATH" >> $GITHUB_ENV

      - name: Verify toolchain
        run: /usr/local/ps3dev/ppu/bin/ppu-gcc --version

      - name: Build
        run: make

      - name: Build PKG
        run: make pkg

      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: ps3wave-pkg
          path: |
            ps3wave.pkg
            ps3wave.self
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ps3wave.pkg
            ps3wave.self
          body: |
            PS3 Wave Screensaver — install ps3wave.pkg via Package Manager on CFW.
            Press any button to exit.
    
